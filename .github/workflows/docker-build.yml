name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]  # 只有当代码合并进 main 分支时才触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 关键步骤：将 GitHub 用户名（如 SC80011）转换为全小写（sc80011）
      # 因为 Docker 镜像仓库名强制要求全小写
      - name: Lowercase the owner name
        run: |
          echo "OWNER_LC=${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 动态引用转为小写后的用户名 ${{ env.OWNER_LC }}
          # 自动指向你自己的仓库名 open-notebook
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/open-notebook:latest
            ghcr.io/${{ env.OWNER_LC }}/open-notebook:${{ github.sha }}