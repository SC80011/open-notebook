name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 关键改进：直接处理完整的仓库路径并转为小写
      - name: Prepare Docker Metadata
        id: meta
        run: |
          # GITHUB_REPOSITORY 的格式是 "Owner/Repo"
          # 使用 ,, 将其全部转为小写
          REPO_NAME_LC="${GITHUB_REPOSITORY,,}"
          echo "image_path=ghcr.io/${REPO_NAME_LC}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 使用上面步骤输出的 image_path，绝对不会出现双斜杠
          tags: |
            ${{ steps.meta.outputs.image_path }}:latest
            ${{ steps.meta.outputs.image_path }}:${{ github.sha }}